name: Build and Publish Custom n8n Node

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: 

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x' 
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci 

      - name: Build the Code
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
